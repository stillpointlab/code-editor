<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>code-editor playground</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 820px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      code-editor {
        display: block;
        height: 45vh;
      }
      code-preview {
        display: block;
        height: 30vh;
        margin-top: 1rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      h2 {
        font-size: 1rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>code-editor playground</h1>
    <code-editor id="editor" language="python"></code-editor>
    <h2>code-preview (read-only, highlighted, updates live)</h2>
    <code-preview id="preview" language="python"></code-preview>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
